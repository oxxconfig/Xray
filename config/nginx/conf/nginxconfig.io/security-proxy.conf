# security headers for reverse proxy apps
# Do not inject Content-Security-Policy here. Proxied applications should
# control their own CSP, otherwise the proxy layer can easily break frontend
# assets, dynamic script loading, or framework-specific policies.
add_header X-XSS-Protection          "1; mode=block" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header Referrer-Policy           "no-referrer-when-downgrade" always;
add_header Permissions-Policy        "interest-cohort=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
